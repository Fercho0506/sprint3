version: "3.9"

# docker-compose.yml — Entorno local para los experimentos ASR-1/2/3
# Uso:
#   docker compose up -d
#   python manage.py runserver 8000

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: finops
      POSTGRES_USER: finops_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finops_user -d finops"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
